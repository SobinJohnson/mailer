name: CI

# Run on every push to any branch, and on every PR targeting main
on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the code ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Node.js 20 with npm cache ───────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. TypeScript type-check (zero tolerance for type errors) ──────────
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── 5. Run all tests in CI mode (single run, no watch) ────────────────
      #
      # We set dummy env vars so routes that read process.env don't throw.
      # Real secrets are NEVER stored here — tests mock the actual DB calls.
      - name: Run tests
        run: npm run test:ci
        env:
          # Fake env vars to satisfy module imports (actual calls are mocked)
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_KEY: test-service-key
          CRON_SECRET: test-cron-secret-12345
          NEXT_PUBLIC_APP_URL: http://localhost:3500
